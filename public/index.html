<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBase</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; min-height: 100vh; }

        #sidebar {
            width: 250px; background-color: var(--card-bg); border-right: 1px solid #e5e7eb;
            padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: transform 0.3s;
        }
        #sidebar h1 { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 20px; text-align: center; }
        #sidebar button {
            background: none; border: none; padding: 12px; text-align: left; font-size: 1rem;
            cursor: pointer; border-radius: 8px; color: var(--text-color); display: flex; align-items: center; gap: 10px;
            transition: background 0.2s;
        }
        #sidebar button:hover { background-color: #eff6ff; color: var(--primary-color); }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--card-bg); padding: 15px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 15px; }
        #menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-color); }
        
        #content-area { padding: 20px; overflow-y: auto; flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-content: start; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .card h3 { margin-bottom: 10px; font-size: 1.2rem; }
        .card p { color: #4b5563; font-size: 0.95rem; line-height: 1.5; }
        
        .btn-fav { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.2rem; color: #ccc; cursor: pointer; transition: color 0.2s; }
        .btn-fav.active { color: #f59e0b; }

        .meteo-box { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
        .badge-uv { padding: 5px 10px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.9rem; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); z-index: 50; }
            #sidebar.active { transform: translateX(0); }
            #menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h1><i class="fas fa-bolt"></i> NewsBase</h1>
        <button onclick="loadSection('actu')"><i class="fas fa-newspaper"></i> Actualités</button>
        <button onclick="loadSection('favoris')"><i class="fas fa-star"></i> Mes Favoris</button>
        <button onclick="loadSection('meteo')"><i class="fas fa-cloud-sun"></i> Météo & Climat</button>
        <button onclick="loadSection('ephemeride')"><i class="fas fa-calendar-alt"></i> Éphéméride</button>
        <button onclick="loadSection('tv')"><i class="fas fa-tv"></i> Programme TV</button>
        <button onclick="loadSection('cinema')"><i class="fas fa-film"></i> Cinéma Bastogne</button>
        <button onclick="loadSection('ia')"><i class="fas fa-robot"></i> Assistant Groq</button>
    </nav>

    <main id="main-content">
        <header>
            <button id="menu-toggle"><i class="fas fa-bars"></i></button>
            <h2 id="section-title">Actualités</h2>
        </header>
        
        <div id="content-area"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
