<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBase - V2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-globe"></i> NewsBase</h2>
            </div>
            <ul class="nav-links">
                <li><a href="#" onclick="loadSection('actu')"><i class="fas fa-newspaper"></i> Actualités</a></li>
                <li><a href="#" onclick="loadSection('favoris')"><i class="fas fa-star"></i> Mes Favoris</a></li>
                <li><a href="#" onclick="loadSection('meteo')"><i class="fas fa-cloud-sun"></i> Météo & Climat</a></li>
                <li><a href="#" onclick="loadSection('ephemeride')"><i class="fas fa-calendar-day"></i> Éphéméride</a></li>
                <li><a href="#" onclick="loadSection('tv')"><i class="fas fa-tv"></i> Programme TV</a></li>
                <li><a href="#" onclick="loadSection('ia')"><i class="fas fa-robot"></i> Assistant IA</a></li>
                <li><a href="#" onclick="loadSection('cinema')"><i class="fas fa-film"></i> Cinéma Bastogne</a></li>li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
                <h1 id="section-title">Accueil</h1>
            </header>
            
            <div id="content-area" class="content-grid">
                <div class="welcome-message">Bienvenue sur NewsBase V2. Sélectionnez une catégorie.</div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
